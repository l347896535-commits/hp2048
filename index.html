<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魔法进化 - 手机版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            font-family: 'Cinzel', serif;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #2d1b4e 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            position: relative;
            overflow: hidden;
            user-select: none;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                radial-gradient(circle at 20% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(147, 51, 234, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(59, 130, 246, 0.05) 0%, transparent 30%);
            pointer-events: none;
            z-index: 0;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .game-container {
            background: linear-gradient(145deg, #1e1e3f 0%, #2a2a4a 100%);
            border: 2px solid #ffd700;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3), 0 0 60px rgba(147, 51, 234, 0.2);
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            margin: auto;
        }

        .game-container::before {
            content: '⚡';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            background: #1e1e3f;
            padding: 0 8px;
            border: 2px solid #ffd700;
            border-radius: 50%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ffed4a, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            letter-spacing: 1px;
            flex: 1;
            min-width: 120px;
        }

        .scores {
            display: flex;
            gap: 6px;
        }

        .score-box {
            background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
            border: 1px solid #ffd700;
            padding: 6px 10px;
            border-radius: 6px;
            text-align: center;
            min-width: 70px;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.2);
        }

        .score-label {
            font-size: 9px;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .score-value {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 8px;
        }

        .game-message {
            font-size: 12px;
            color: #c4b5fd;
            flex: 1;
            text-align: center;
        }

        .new-game-btn {
            background: linear-gradient(145deg, #7c3aed, #5b21b6);
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px rgba(147, 51, 234, 0.4);
            white-space: nowrap;
        }

        .new-game-btn:active {
            background: linear-gradient(145deg, #6d28d9, #5b21b6);
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.6);
            transform: scale(0.95);
        }

        .revive-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .avada-btn {
            background: linear-gradient(145deg, #7f1d1d, #450a0a);
            color: #fecaca;
            border: 1px solid #ef4444;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.5px;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
            white-space: nowrap;
        }

        .avada-btn:hover {
            background: linear-gradient(145deg, #991b1b, #7f1d1d);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
            transform: scale(1.02);
        }

        .avada-btn:active {
            background: linear-gradient(145deg, #450a0a, #1f0505);
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.8);
            transform: scale(0.95);
        }

        .patronus-btn {
            background: linear-gradient(145deg, #059669, #047857);
            color: #ecfdf5;
            border: 1px solid #34d399;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.5px;
            box-shadow: 0 0 15px rgba(52, 211, 153, 0.4);
            white-space: nowrap;
        }

        .patronus-btn:hover {
            background: linear-gradient(145deg, #10b981, #059669);
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.6);
            transform: scale(1.02);
        }

        .patronus-btn:active {
            background: linear-gradient(145deg, #047857, #065f46);
            box-shadow: 0 0 25px rgba(52, 211, 153, 0.8);
            transform: scale(0.95);
        }

        .revive-stats {
            display: flex;
            gap: 15px;
            margin-top: 12px;
            justify-content: center;
            font-size: 12px;
        }

        .revive-stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .avada-stat-label {
            color: #fca5a5;
        }

        .avada-stat-value {
            color: #ef4444;
            font-weight: bold;
        }

        .patronus-stat-label {
            color: #6ee7b7;
        }

        .patronus-stat-value {
            color: #34d399;
            font-weight: bold;
        }

        .undo-btn {
            background: linear-gradient(145deg, #7c3aed, #5b21b6);
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px rgba(147, 51, 234, 0.4);
            white-space: nowrap;
        }

        .undo-btn:active:not(:disabled) {
            background: linear-gradient(145deg, #6d28d9, #5b21b6);
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.6);
            transform: scale(0.95);
        }

        .undo-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .grid-container {
            background: linear-gradient(145deg, #1a1a3a, #0f0f2a);
            border: 1px solid #7c3aed;
            border-radius: 10px;
            padding: 8px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            touch-action: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .cell {
            aspect-ratio: 1;
            min-height: 55px;
            background: rgba(42, 42, 74, 0.6);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            font-weight: bold;
            transition: all 0.15s ease;
            text-align: center;
            padding: 3px;
            line-height: 1.2;
            word-break: break-word;
            overflow: hidden;
        }

        .cell .level-number {
            font-size: 8px;
            opacity: 0.6;
            margin-bottom: 1px;
            white-space: nowrap;
        }

        .cell .level-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        /* 长等级名称样式 */
        .cell.long-text .level-name {
            font-size: 8px;
        }

        .cell.medium-text .level-name {
            font-size: 9px;
        }

        /* 光明线等级颜色 - 初级 */
        .cell[data-value="2"] { background: linear-gradient(145deg, #4a5568, #2d3748); color: #cbd5e0; border-color: #718096; }
        .cell[data-value="4"] { background: linear-gradient(145deg, #744210, #5c2d0d); color: #fbd38d; border-color: #dd6b20; }
        .cell[data-value="8"] { background: linear-gradient(145deg, #1e40af, #1e3a8a); color: #dbeafe; border-color: #3b82f6; }
        .cell[data-value="16"] { background: linear-gradient(145deg, #7c3aed, #6d28d9); color: #f3e8ff; border-color: #a78bfa; }
        .cell[data-value="32"] { background: linear-gradient(145deg, #2c5282, #1a365d); color: #bee3f8; border-color: #3182ce; }
        .cell[data-value="64"] { background: linear-gradient(145deg, #553c9a, #44337a); color: #e9d8fd; border-color: #805ad5; }
        .cell[data-value="128"] { background: linear-gradient(145deg, #c05621, #9c4221); color: #feebc8; border-color: #dd6b20; box-shadow: 0 0 10px rgba(221, 107, 32, 0.4); }
        .cell[data-value="256"] { background: linear-gradient(145deg, #0e7490, #155e75); color: #aee2e9; border-color: #0891b2; }
        .cell[data-value="512"] { background: linear-gradient(145deg, #9d174d, #831843); color: #fce7f3; border-color: #db2777; box-shadow: 0 0 10px rgba(219, 39, 119, 0.4); }

        /* 光明线等级颜色 - 高级（分支后） */
        .cell[data-value="1024"] { background: linear-gradient(145deg, #1e3a5f, #172a45); color: #bee3f8; border-color: #63b3ed; box-shadow: 0 0 15px rgba(99, 179, 237, 0.5); }
        .cell[data-value="2048"] { background: linear-gradient(145deg, #1a365d, #0f2540); color: #90cdf4; border-color: #4299e1; box-shadow: 0 0 18px rgba(66, 153, 225, 0.6); }
        .cell[data-value="4096"] { background: linear-gradient(145deg, #1e40af, #172554); color: #bfdbfe; border-color: #60a5fa; box-shadow: 0 0 20px rgba(96, 165, 250, 0.7); }
        .cell[data-value="8192"] { background: linear-gradient(145deg, #1e3a8a, #172554); color: #dbeafe; border-color: #93c5fd; box-shadow: 0 0 25px rgba(147, 197, 253, 0.8); animation: auror-glow 2s ease-in-out infinite; }
        .cell[data-value="16384"] { background: linear-gradient(145deg, #fef3c7, #fcd34d); color: #78350f; border-color: #fbbf24; box-shadow: 0 0 35px rgba(251, 191, 36, 0.9); animation: auror-supreme-pulse 1.5s ease-in-out infinite; }
        .cell[data-value="32768"] { background: linear-gradient(145deg, #e0e7ff, #c7d2fe); color: #3730a3; border-color: #6366f1; box-shadow: 0 0 40px rgba(99, 102, 241, 1); animation: merlin-pulse 1.5s ease-in-out infinite; }

        /* 黑暗线等级颜色 */
        .cell.dark-path[data-value="1024"] { background: linear-gradient(145deg, #1a1a2e, #0f0f1a); color: #b39ddb; border-color: #5e35b1; box-shadow: 0 0 15px rgba(94, 53, 177, 0.5); }
        .cell.dark-path[data-value="2048"] { background: linear-gradient(145deg, #1e0033, #12001f); color: #ce93d8; border-color: #7b1fa2; box-shadow: 0 0 18px rgba(123, 31, 162, 0.6); }
        .cell.dark-path[data-value="4096"] { background: linear-gradient(145deg, #2d0a0a, #1a0505); color: #ef9a9a; border-color: #b71c1c; box-shadow: 0 0 20px rgba(183, 28, 28, 0.6); }
        .cell.dark-path[data-value="8192"] { background: linear-gradient(145deg, #0a0a0a, #000000); color: #ffd700; border-color: #ffd700; box-shadow: 0 0 25px rgba(255, 215, 0, 0.8); animation: dark-lord-glow 2s ease-in-out infinite; }
        .cell.dark-path[data-value="16384"] { background: linear-gradient(145deg, #1a0000, #0a0000); color: #ff1744; border-color: #ff1744; box-shadow: 0 0 35px rgba(255, 23, 68, 0.9); animation: dark-wizard-pulse 1.5s ease-in-out infinite; }
        .cell.dark-path[data-value="32768"] { background: linear-gradient(145deg, #1a0a2e, #0f0f1a); color: #e9d5ff; border-color: #a855f7; box-shadow: 0 0 40px rgba(168, 85, 247, 1); animation: merlin-dark-pulse 1.5s ease-in-out infinite; }

        /* 光明线高级动画 */
        @keyframes auror-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(147, 197, 253, 0.6), 0 0 40px rgba(99, 179, 237, 0.4); }
            50% { box-shadow: 0 0 35px rgba(147, 197, 253, 0.9), 0 0 50px rgba(99, 179, 237, 0.6); }
        }

        @keyframes auror-supreme-pulse {
            0%, 100% { box-shadow: 0 0 25px rgba(251, 191, 36, 0.8), 0 0 50px rgba(251, 191, 36, 0.5); }
            50% { box-shadow: 0 0 45px rgba(251, 191, 36, 1), 0 0 60px rgba(251, 191, 36, 0.7); }
        }

        @keyframes dark-lord-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 0 0 40px rgba(0, 0, 0, 0.8); }
            50% { box-shadow: 0 0 35px rgba(255, 215, 0, 0.9), 0 0 50px rgba(0, 0, 0, 1); }
        }

        @keyframes dark-wizard-pulse {
            0%, 100% { box-shadow: 0 0 25px rgba(255, 23, 68, 0.7), 0 0 50px rgba(0, 0, 0, 0.8); }
            50% { box-shadow: 0 0 40px rgba(255, 23, 68, 1), 0 0 60px rgba(255, 0, 0, 0.5); }
        }

        @keyframes merlin-pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(99, 102, 241, 0.8), 0 0 60px rgba(129, 140, 248, 0.5); }
            50% { box-shadow: 0 0 50px rgba(99, 102, 241, 1), 0 0 80px rgba(165, 180, 252, 0.7); }
        }

        @keyframes merlin-dark-pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(168, 85, 247, 0.8), 0 0 60px rgba(0, 0, 0, 0.8); }
            50% { box-shadow: 0 0 50px rgba(168, 85, 247, 1), 0 0 80px rgba(0, 0, 0, 1); }
        }

        /* 阿瓦达索命动画 */
        @keyframes avada-effect {
            0% { filter: brightness(1); }
            20% { filter: brightness(3) hue-rotate(-30deg); }
            40% { filter: brightness(0.5) saturate(0); }
            60% { filter: brightness(2) hue-rotate(30deg); }
            80% { filter: brightness(1.2); }
            100% { filter: brightness(1); }
        }

        .grid-container.avada-active {
            animation: avada-flash 0.5s ease;
        }

        @keyframes avada-flash {
            0% { box-shadow: inset 0 0 0 0 transparent; }
            25% { box-shadow: inset 0 0 50px 20px rgba(220, 38, 38, 0.8); }
            50% { box-shadow: inset 0 0 80px 30px rgba(0, 0, 0, 0.9); }
            75% { box-shadow: inset 0 0 50px 20px rgba(220, 38, 38, 0.5); }
            100% { box-shadow: inset 0 0 0 0 transparent; }
        }

        /* 呼神护卫动画 */
        @keyframes patronus-effect {
            0% { filter: brightness(1); }
            30% { filter: brightness(2) hue-rotate(60deg); }
            60% { filter: brightness(1.5); }
            100% { filter: brightness(1); }
        }

        .grid-container.patronus-active {
            animation: patronus-glow 0.6s ease;
        }

        @keyframes patronus-glow {
            0% { box-shadow: inset 0 0 0 0 transparent; }
            25% { box-shadow: inset 0 0 50px 20px rgba(52, 211, 153, 0.8); }
            50% { box-shadow: inset 0 0 80px 30px rgba(147, 197, 253, 0.6); }
            75% { box-shadow: inset 0 0 50px 20px rgba(52, 211, 153, 0.5); }
            100% { box-shadow: inset 0 0 0 0 transparent; }
        }

        /* 被消除的方块动画 */
        .cell.avada-killed {
            animation: avada-kill 0.4s ease forwards;
        }

        @keyframes avada-kill {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; background: #ef4444; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* 被晋级的方块动画 */
        .cell.patronus-upgraded {
            animation: patronus-upgrade 0.5s ease;
        }

        @keyframes patronus-upgrade {
            0% { transform: scale(1); }
            30% { transform: scale(1.3); box-shadow: 0 0 20px rgba(52, 211, 153, 0.8); }
            60% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .cell.merged {
            animation: magic-pop 0.3s ease;
        }

        @keyframes magic-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }
            100% { transform: scale(1); }
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 15, 42, 0.95);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            border: 1px solid #7c3aed;
            z-index: 10;
        }

        .game-over-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over-text {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ffed4a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-align: center;
            padding: 0 10px;
        }

        .final-scores {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .final-score-item {
            text-align: center;
        }

        .final-score-label {
            font-size: 10px;
            color: #c4b5fd;
            margin-bottom: 4px;
        }

        .final-score-value {
            font-size: 22px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* 成就弹窗样式 */
        .achievement-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #1e1e3f, #2a2a4a);
            border: 3px solid #ffd700;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.6), 0 0 80px rgba(147, 51, 234, 0.4);
            width: 85%;
            max-width: 280px;
        }

        .achievement-popup.show {
            opacity: 1;
            pointer-events: auto;
            animation: achievement-appear 0.6s ease;
        }

        @keyframes achievement-appear {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.05); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .achievement-icon {
            font-size: 48px;
            margin-bottom: 10px;
            animation: achievement-bounce 1s ease infinite;
        }

        @keyframes achievement-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .achievement-title {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ffed4a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .achievement-level {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
        }

        .achievement-desc {
            font-size: 13px;
            color: #c4b5fd;
            margin-bottom: 20px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .achievement-btn {
            background: linear-gradient(145deg, #7c3aed, #5b21b6);
            color: #ffd700;
            border: 2px solid #ffd700;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.5px;
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.5);
        }

        .achievement-btn:active {
            background: linear-gradient(145deg, #6d28d9, #5b21b6);
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.7);
            transform: scale(0.95);
        }

        /* 分支选择弹窗样式 */
        .choice-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 3px solid #9333ea;

        // 获取3个随机不重复的事件
        function getRandomEvents() {
            const shuffled = [...MAGIC_EVENTS].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, 3);
        }

        // 当前路径
        let currentPath = 'light'; // 'light' 或 'dark'
        let eventIndex = 0;
        let pendingDarkUpgrade = false;
        let currentEvents = [];

        // 创建等级图例
        function createLegend() {
            const legend = document.getElementById('legend');
            // 只显示到七年级（512）
            const lightLevels = [2, 4, 8, 16, 32, 64, 128, 256, 512];

            const lightColors = {
                2: 'linear-gradient(145deg, #4a5568, #2d3748)',
                4: 'linear-gradient(145deg, #744210, #5c2d0d)',
                8: 'linear-gradient(145deg, #1e40af, #1e3a8a)',
                16: 'linear-gradient(145deg, #7c3aed, #6d28d9)',
                32: 'linear-gradient(145deg, #2c5282, #1a365d)',
                64: 'linear-gradient(145deg, #553c9a, #44337a)',
                128: 'linear-gradient(145deg, #c05621, #9c4221)',
                256: 'linear-gradient(145deg, #0e7490, #155e75)',
                512: 'linear-gradient(145deg, #9d174d, #831843)'
            };

            // 添加等级
            lightLevels.forEach(level => {
                const item = document.createElement('div');

                    <div class="legend-color" style="background: ${lightColors[level]}"></div>

            });

            // 添加分隔
            const divider = document.createElement('div');

            divider.innerHTML = '<span>✦ 命运之路由你抉择 ✦</span>';
            legend.appendChild(divider);
        }
        createLegend();

        class HarryPotterGame {
            constructor() {
                this.size = 4;
                this.grid = [];
                this.score = 0;
                this.bestScore = parseInt(localStorage.getItem('bestScoreWizardMobile')) || 0;
                this.gameOver = false;
                this.won = false;
                this.achievementsShown = new Set();
                this.isPaused = false;
                this.previousState = null;
                this.touchStartX = 0;
                this.touchStartY = 0;
                this.touchEndX = 0;
                this.touchEndY = 0;
                this.minSwipeDistance = 30;
                // 复活次数统计
                this.avadaCount = 0;
                this.patronusCount = 0;
                // 分支相关变量
                this.currentPath = 'light'; // 'light' 或 'dark'
                this.eventIndex = 0;
                this.currentEvents = [];
                this.darkModeUnlocked = false;
                this.init();
            }

            init() {
                this.gridElement = document.getElementById('grid');
                this.gridContainer = document.getElementById('grid-container');
                this.scoreElement = document.getElementById('score');
                this.bestScoreElement = document.getElementById('best-score');
                this.gameMessageElement = document.getElementById('game-message');
                this.gameOverElement = document.getElementById('game-over');
                this.finalScoreElement = document.getElementById('final-score');
                this.finalBestScoreElement = document.getElementById('final-best-score');
                this.achievementPopup = document.getElementById('achievement-popup');
                this.achievementTitle = document.getElementById('achievement-title');
                this.achievementLevel = document.getElementById('achievement-level');
                this.achievementDesc = document.getElementById('achievement-desc');
                this.achievementIcon = document.querySelector('.achievement-icon');
                this.achievementContinueBtn = document.getElementById('achievement-continue');
                this.undoBtn = document.getElementById('undo-btn');

                // 弹窗元素
                this.eventPopup = document.getElementById('event-popup');
                this.resultPopup = document.getElementById('result-popup');

                this.createGrid();
                this.setupEventListeners();
                this.updateBestScore();
                this.newGame();
                this.showSwipeHint();
            }

            createGrid() {
                this.gridElement.innerHTML = '';
                for (let i = 0; i < this.size * this.size; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    this.gridElement.appendChild(cell);
                }
            }

            setupEventListeners() {
                // 触摸事件
                this.gridContainer.addEventListener('touchstart', (e) => this.handleTouchStart(e), { passive: true });
                this.gridContainer.addEventListener('touchmove', (e) => this.handleTouchMove(e), { passive: true });
                this.gridContainer.addEventListener('touchend', (e) => this.handleTouchEnd(e), { passive: true });

                // 键盘事件（用于调试）
                document.addEventListener('keydown', (e) => this.handleKeyPress(e));

                // 按钮事件
                document.getElementById('new-game').addEventListener('click', () => this.newGame());
                document.getElementById('try-again').addEventListener('click', () => this.newGame());
                document.getElementById('avada-btn').addEventListener('click', () => this.avadaKedavra());
                document.getElementById('patronus-btn').addEventListener('click', () => this.expectoPatronum());
                this.achievementContinueBtn.addEventListener('click', () => this.hideAchievement());
                this.undoBtn.addEventListener('click', () => this.undo());

                // 结果弹窗继续按钮
                document.getElementById('result-continue').addEventListener('click', () => this.hideResultAndContinue());
            }

            saveState() {
                this.previousState = {
                    grid: this.grid.map(row => [...row]),
                    score: this.score
                };
                this.undoBtn.disabled = false;
            }

            undo() {
                if (!this.previousState) return;
                this.grid = this.previousState.grid.map(row => [...row]);
                this.score = this.previousState.score;
                this.previousState = null;
                this.undoBtn.disabled = true;
                this.updateScore();
                this.render();
            }

            // 阿瓦达索命 - 消除场上所有麻瓜(2)和哑炮(4)
            avadaKedavra() {
                if (!this.gameOver) return;

                // 恢复游戏状态
                this.gameOver = false;
                this.gameOverElement.classList.remove('show');
                this.gameMessageElement.textContent = '💀 阿瓦达索命！清除麻瓜和哑炮！';

                // 增加阿瓦达索命次数统计
                this.avadaCount++;
                document.getElementById('avada-count').textContent = this.avadaCount;

                // 播放阿瓦达效果动画
                this.gridContainer.classList.add('avada-active');
                setTimeout(() => this.gridContainer.classList.remove('avada-active'), 500);

                // 先渲染当前状态，让用户看到要消除的方块
                this.render();

                // 延迟后消除所有2和4，添加新方块
                setTimeout(() => {
                    // 消除所有2和4
                    for (let r = 0; r < this.size; r++) {
                        for (let c = 0; c < this.size; c++) {
                            if (this.grid[r][c] === 2 || this.grid[r][c] === 4) {
                                this.grid[r][c] = 0;
                            }
                        }
                    }

                    // 至少保证有一个空位
                    this.addRandomTile();
                    this.render();

                    // 检查是否还能移动
                    if (!this.canMove()) {
                        this.gameOver = true;
                        this.finalScoreElement.textContent = this.score;
                        this.finalBestScoreElement.textContent = Math.max(this.score, this.bestScore);
                        this.gameOverElement.classList.add('show');
                        this.gameMessageElement.textContent = '魔法旅程结束!';
                    }
                }, 300);

                // 震动反馈
                if (navigator.vibrate) {
                    navigator.vibrate([50, 100, 50]);
                }
            }

            // 呼神护卫 - 将场上最小数字晋级
            expectoPatronum() {
                if (!this.gameOver) return;

                // 增加呼神护卫次数统计
                this.patronusCount++;
                document.getElementById('patronus-count').textContent = this.patronusCount;

                // 找到场上最小的非零数字
                let minValue = Infinity;
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.grid[r][c] > 0 && this.grid[r][c] < minValue) {
                            minValue = this.grid[r][c];
                        }
                    }
                }

                if (minValue === Infinity || minValue >= 16384) {
                    // 如果没有可以晋级的了，给一个随机方块
                    this.gameOver = false;
                    this.gameOverElement.classList.remove('show');
                    this.gameMessageElement.textContent = '🦅 守护神显灵！';

                    // 播放呼神护卫效果动画
                    this.gridContainer.classList.add('patronus-active');
                    setTimeout(() => this.gridContainer.classList.remove('patronus-active'), 600);

                    this.addRandomTile();
                    this.render();

                    // 检查是否还能移动
                    if (!this.canMove()) {
                        this.gameOver = true;
                        this.finalScoreElement.textContent = this.score;
                        this.finalBestScoreElement.textContent = Math.max(this.score, this.bestScore);
                        this.gameOverElement.classList.add('show');
                        this.gameMessageElement.textContent = '魔法旅程结束!';
                    }
                    return;
                }

                // 恢复游戏状态
                this.gameOver = false;
                this.gameOverElement.classList.remove('show');
                this.gameMessageElement.textContent = `🦅 守护神显灵！${minValue}晋级为${minValue * 2}！`;

                // 播放呼神护卫效果动画
                this.gridContainer.classList.add('patronus-active');
                setTimeout(() => this.gridContainer.classList.remove('patronus-active'), 600);

                // 先渲染当前状态，让用户看到要晋级的方块
                this.render();

                // 延迟后将所有最小数字晋级
                setTimeout(() => {
                    const newValue = minValue * 2;
                    for (let r = 0; r < this.size; r++) {
                        for (let c = 0; c < this.size; c++) {
                            if (this.grid[r][c] === minValue) {
                                this.grid[r][c] = newValue;
                                this.score += newValue;
                            }
                        }
                    }

                    this.updateScore();
                    this.render();

                    // 检查是否还能移动
                    if (!this.canMove()) {
                        this.gameOver = true;
                        this.finalScoreElement.textContent = this.score;
                        this.finalBestScoreElement.textContent = Math.max(this.score, this.bestScore);
                        this.gameOverElement.classList.add('show');
                        this.gameMessageElement.textContent = '魔法旅程结束!';
                    }
                }, 300);

                // 震动反馈
                if (navigator.vibrate) {
                    navigator.vibrate([50, 100, 50]);
                }
            }

            handleTouchStart(e) {
                if (this.gameOver || this.isPaused) return;
                this.touchStartX = e.changedTouches[0].screenX;
                this.touchStartY = e.changedTouches[0].screenY;
            }

            handleTouchMove(e) {
                // 防止滚动
                if (e.target.closest('#grid-container')) {
                    e.preventDefault();
                }
            }

            handleTouchEnd(e) {
                if (this.gameOver || this.isPaused) return;

                this.touchEndX = e.changedTouches[0].screenX;
                this.touchEndY = e.changedTouches[0].screenY;

                this.handleSwipe();
            }

            handleSwipe() {
                const deltaX = this.touchEndX - this.touchStartX;
                const deltaY = this.touchEndY - this.touchStartY;
                const absDeltaX = Math.abs(deltaX);
                const absDeltaY = Math.abs(deltaY);

                // 检查是否达到最小滑动距离
                if (Math.max(absDeltaX, absDeltaY) < this.minSwipeDistance) {
                    return;
                }

                let moved = false;

                // 判断滑动方向
                if (absDeltaX > absDeltaY) {
                    // 水平滑动
                    if (deltaX > 0) {
                        moved = this.moveRight();
                    } else {
                        moved = this.moveLeft();
                    }
                } else {
                    // 垂直滑动
                    if (deltaY > 0) {
                        moved = this.moveDown();
                    } else {
                        moved = this.moveUp();
                    }
                }

                if (moved) {
                    // 震动反馈（如果设备支持）
                    if (navigator.vibrate) {
                        navigator.vibrate(10);
                    }
                    this.addRandomTile();
                    this.render();
                    this.checkGameState();
                }
            }

            handleKeyPress(e) {
                if (this.gameOver || this.isPaused) return;

                let moved = false;
                switch(e.key) {
                    case 'ArrowUp':
                        moved = this.moveUp();
                        e.preventDefault();
                        break;
                    case 'ArrowDown':
                        moved = this.moveDown();
                        e.preventDefault();
                        break;
                    case 'ArrowLeft':
                        moved = this.moveLeft();
                        e.preventDefault();
                        break;
                    case 'ArrowRight':
                        moved = this.moveRight();
                        e.preventDefault();
                        break;
                }

                if (moved) {
                    this.addRandomTile();
                    this.render();
                    this.checkGameState();
                }
            }

            showSwipeHint() {
                const hint = document.createElement('div');
                hint.className = 'swipe-hint';
                hint.textContent = '→';
                this.gridContainer.appendChild(hint);
                setTimeout(() => hint.remove(), 2000);
            }

            newGame() {
                this.grid = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                this.score = 0;
                this.avadaCount = 0;
                this.patronusCount = 0;
                // 更新显示
                document.getElementById('avada-count').textContent = '0';
                document.getElementById('patronus-count').textContent = '0';
                this.gameOver = false;
                this.won = false;
                this.achievementsShown.clear();
                this.isPaused = false;
                this.previousState = null;
                this.undoBtn.disabled = true;
                this.gameOverElement.classList.remove('show');
                this.hideAchievement();
                this.gameMessageElement.textContent = '滑动屏幕移动';
                this.updateScore();

                this.addRandomTile();
                this.addRandomTile();
                this.render();
            }

            showAchievement(level) {
                if (this.achievementsShown.has(level)) return;
                this.achievementsShown.add(level);

                const achievement = ACHIEVEMENTS[level];
                if (achievement) {
                    this.isPaused = true;
                    this.achievementIcon.textContent = achievement.icon;
                    this.achievementTitle.textContent = achievement.title;
                    this.achievementLevel.textContent = WIZARD_LEVELS[level];
                    this.achievementDesc.textContent = achievement.desc;
                    this.achievementPopup.classList.add('show');

                    // 震动反馈
                    if (navigator.vibrate) {
                        navigator.vibrate([50, 50, 50]);
                    }
                }
            }

            hideAchievement() {
                this.achievementPopup.classList.remove('show');
                this.isPaused = false;
            }

            addRandomTile() {
                const emptyCells = [];
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.grid[r][c] === 0) {
                            emptyCells.push({ r, c });
                        }
                    }
                }

                if (emptyCells.length > 0) {
                    const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    this.grid[r][c] = Math.random() < 0.9 ? 2 : 4;
                }
            }

            render() {
                const cells = this.gridElement.children;
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        const index = r * this.size + c;
                        const value = this.grid[r][c];
                        const cell = cells[index];

                        // 清除之前的dark-path类和文字长度类
                        cell.classList.remove('dark-path', 'long-text', 'medium-text');

                        if (value === 0) {
                            cell.innerHTML = '';
                            cell.setAttribute('data-value', '0');
                        } else {
                            // 根据当前路径显示正确的等级名称
                            let levelName;
                            let isDarkPath = false;
                            if (this.currentPath === 'dark' && DARK_WIZARD_LEVELS[value]) {
                                levelName = DARK_WIZARD_LEVELS[value];
                                isDarkPath = true;
                                cell.classList.add('dark-path');
                            } else {
                                levelName = WIZARD_LEVELS[value] || value;
                            }
                            // 根据文字长度添加样式类
                            if (levelName.length >= 6) {
                                cell.classList.add('long-text');
                            } else if (levelName.length >= 4) {
                                cell.classList.add('medium-text');
                            }
                            cell.innerHTML = `<div class="level-number">${value}</div><div class="level-name">${levelName}</div>`;
                            cell.setAttribute('data-value', value);
                        }
                    }
                }
            }

            updateScore() {
                this.scoreElement.textContent = this.score;
            }

            updateBestScore() {
                this.bestScoreElement.textContent = this.bestScore;
            }

            moveLeft() {
                this.saveState();
                let moved = false;
                for (let r = 0; r < this.size; r++) {
                    let row = this.grid[r].filter(v => v !== 0);
                    let newRow = [];
                    let merged = new Set();

                    for (let i = 0; i < row.length; i++) {
                        if (i + 1 < row.length && row[i] === row[i + 1] && !merged.has(i + 1)) {
                            const mergedValue = row[i] * 2;
                            newRow.push(mergedValue);
                            this.score += mergedValue;
                            merged.add(i + 1);
                            if (this.score > this.bestScore) {
                                this.bestScore = this.score;
                                localStorage.setItem('bestScoreWizardMobile', this.bestScore);
                                this.updateBestScore();
                            }
                            moved = true;
                        } else if (!merged.has(i)) {
                            newRow.push(row[i]);
                        }
                    }

                    while (newRow.length < this.size) {
                        newRow.push(0);
                    }

                    for (let c = 0; c < this.size; c++) {
                        if (this.grid[r][c] !== newRow[c]) {
                            moved = true;
                        }
                        this.grid[r][c] = newRow[c];
                    }
                }
                this.updateScore();
                if (!moved) this.previousState = null;
                this.undoBtn.disabled = !this.previousState;
                return moved;
            }

            moveRight() {
                this.saveState();
                let moved = false;
                for (let r = 0; r < this.size; r++) {
                    let row = this.grid[r].filter(v => v !== 0);
                    let newRow = [];
                    let merged = new Set();

                    for (let i = row.length - 1; i >= 0; i--) {
                        if (i - 1 >= 0 && row[i] === row[i - 1] && !merged.has(i - 1)) {
                            const mergedValue = row[i] * 2;
                            newRow.unshift(mergedValue);
                            this.score += mergedValue;
                            merged.add(i - 1);
                            if (this.score > this.bestScore) {
                                this.bestScore = this.score;
                                localStorage.setItem('bestScoreWizardMobile', this.bestScore);
                                this.updateBestScore();
                            }
                            moved = true;
                        } else if (!merged.has(i)) {
                            newRow.unshift(row[i]);
                        }
                    }

                    while (newRow.length < this.size) {
                        newRow.unshift(0);
                    }

                    for (let c = 0; c < this.size; c++) {
                        if (this.grid[r][c] !== newRow[c]) {
                            moved = true;
                        }
                        this.grid[r][c] = newRow[c];
                    }
                }
                this.updateScore();
                if (!moved) this.previousState = null;
                this.undoBtn.disabled = !this.previousState;
                return moved;
            }

            moveUp() {
                this.saveState();
                let moved = false;
                for (let c = 0; c < this.size; c++) {
                    let col = [];
                    for (let r = 0; r < this.size; r++) {
                        if (this.grid[r][c] !== 0) {
                            col.push(this.grid[r][c]);
                        }
                    }

                    let newCol = [];
                    let merged = new Set();

                    for (let i = 0; i < col.length; i++) {
                        if (i + 1 < col.length && col[i] === col[i + 1] && !merged.has(i + 1)) {
                            const mergedValue = col[i] * 2;
                            newCol.push(mergedValue);
                            this.score += mergedValue;
                            merged.add(i + 1);
                            if (this.score > this.bestScore) {
                                this.bestScore = this.score;
                                localStorage.setItem('bestScoreWizardMobile', this.bestScore);
                                this.updateBestScore();
                            }
                            moved = true;
                        } else if (!merged.has(i)) {
                            newCol.push(col[i]);
                        }
                    }

                    while (newCol.length < this.size) {
                        newCol.push(0);
                    }

                    for (let r = 0; r < this.size; r++) {
                        if (this.grid[r][c] !== newCol[r]) {
                            moved = true;
                        }
                        this.grid[r][c] = newCol[r];
                    }
                }
                this.updateScore();
                if (!moved) this.previousState = null;
                this.undoBtn.disabled = !this.previousState;
                return moved;
            }

            moveDown() {
                this.saveState();
                let moved = false;
                for (let c = 0; c < this.size; c++) {
                    let col = [];
                    for (let r = 0; r < this.size; r++) {
                        if (this.grid[r][c] !== 0) {
                            col.push(this.grid[r][c]);
                        }
                    }

                    let newCol = [];
                    let merged = new Set();

                    for (let i = col.length - 1; i >= 0; i--) {
                        if (i - 1 >= 0 && col[i] === col[i - 1] && !merged.has(i - 1)) {
                            const mergedValue = col[i] * 2;
                            newCol.unshift(mergedValue);
                            this.score += mergedValue;
                            merged.add(i - 1);
                            if (this.score > this.bestScore) {
                                this.bestScore = this.score;
                                localStorage.setItem('bestScoreWizardMobile', this.bestScore);
                                this.updateBestScore();
                            }
                            moved = true;
                        } else if (!merged.has(i)) {
                            newCol.unshift(col[i]);
                        }
                    }

                    while (newCol.length < this.size) {
                        newCol.unshift(0);
                    }

                    for (let r = 0; r < this.size; r++) {
                        if (this.grid[r][c] !== newCol[r]) {
                            moved = true;
                        }
                        this.grid[r][c] = newCol[r];
                    }
                }
                this.updateScore();
                if (!moved) this.previousState = null;
                this.undoBtn.disabled = !this.previousState;
                return moved;
            }

            checkGameState() {
                // 检查是否达到成就等级
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        const value = this.grid[r][c];

                        // 检查是否触发了魔法事件（七年级512合并成1024）
                        if (value === 1024 && this.currentPath === 'light' && !this.darkModeUnlocked) {
                            // 标记即将触发魔法事件，暂不显示成就弹窗
                            this.darkModeUnlocked = true;
                            // 延迟一下让玩家看到合并结果，然后开始魔法事件
                            setTimeout(() => {
                                this.startMagicEvents();
                            }, 300);
                            continue;
                        }

                        // 光明线成就（如果在魔法事件进行中则跳过1024成就）
                        if (this.currentPath === 'light' && ACHIEVEMENTS[value]) {
                            // 如果是1024且刚触发魔法事件，不显示成就，等魔法事件结束后显示
                            if (value === 1024 && this.darkModeUnlocked) {
                                continue;
                            }
                            this.showAchievement(value);
                        }

                        // 黑暗线成就
                        if (this.currentPath === 'dark' && DARK_ACHIEVEMENTS[value]) {
                            this.showDarkAchievement(value);
                        }

                        if (this.currentPath === 'light' && value === 16384 && !this.won) {
                            this.won = true;
                            setTimeout(() => {
                                this.gameMessageElement.textContent = '⚡ 最伟大的白巫师！';
                            }, 100);
                        }

                        if (this.currentPath === 'dark' && value === 16384 && !this.won) {
                            this.won = true;
                            setTimeout(() => {
                                this.gameMessageElement.textContent = '☠ 最伟大的黑巫师！';
                            }, 100);
                        }

                        // 梅林之约成就
                        if (value === 32768) {
                            if (this.currentPath === 'light') {
                                this.won = true;
                                setTimeout(() => {
                                    this.gameMessageElement.textContent = '✨ 梅林之约！魔法之巅！';
                                }, 100);
                            } else {
                                this.won = true;
                                setTimeout(() => {
                                    this.gameMessageElement.textContent = '👑 梅林之约！黑暗之主！';
                                }, 100);
                            }
                        }
                    }
                }

                if (!this.canMove()) {
                    this.gameOver = true;
                    this.finalScoreElement.textContent = this.score;
                    this.finalBestScoreElement.textContent = Math.max(this.score, this.bestScore);
                    this.gameOverElement.classList.add('show');
                    this.gameMessageElement.textContent = '魔法旅程结束!';
                }
            }

            // 开始魔法事件
            startMagicEvents() {
                this.currentEvents = getRandomEvents();
                this.eventIndex = 0;
                this.darkChoiceCount = 0; // 记录黑暗选择次数
                this.showNextEvent();
            }

            // 显示下一个魔法事件
            showNextEvent() {
                if (this.eventIndex >= this.currentEvents.length) {
                    // 事件结束，根据选择决定路线
                    this.determinePath();
                    return;
                }

                const event = this.currentEvents[this.eventIndex];
                document.getElementById('event-title').textContent = event.title;
                document.getElementById('event-desc').textContent = event.description;
                document.getElementById('event-progress-num').textContent = this.eventIndex + 1;

                const choicesContainer = document.getElementById('event-choices');
                choicesContainer.innerHTML = '';

                event.choices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = `event-choice-btn ${choice.path}`;
                    btn.textContent = choice.text;
                    btn.addEventListener('click', () => this.handleEventChoice(choice));
                    choicesContainer.appendChild(btn);
                });

                this.eventPopup.classList.add('show');
            }

            // 处理事件选择
            handleEventChoice(choice) {
                this.eventPopup.classList.remove('show');

                // 记录选择
                if (choice.path === 'dark') {
                    this.darkChoiceCount++;
                }

                // 显示结果 - 更隐晦的提示
                const isDark = choice.path === 'dark';
                document.getElementById('result-icon').textContent = isDark ? '🌑' : '🌕';
                document.getElementById('result-title').textContent = isDark ? '命运已改写' : '命运仍在前行';
                document.getElementById('result-desc').textContent = choice.result;

                if (isDark) {
                    this.resultPopup.classList.add('dark-result');
                } else {
                    this.resultPopup.classList.remove('dark-result');
                }

                this.resultPopup.classList.add('show');
            }

            // 隐藏结果并继续
            hideResultAndContinue() {
                this.resultPopup.classList.remove('show');
                this.resultPopup.classList.remove('dark-result');
                this.eventIndex++;
                this.showNextEvent();
            }

            // 根据选择决定路线
            determinePath() {
                // 2次及以上黑暗选择走黑暗路线
                if (this.darkChoiceCount >= 2) {
                    this.currentPath = 'dark';
                    this.promoteToDarkWizard();
                } else {
                    this.currentPath = 'light';
                    // 光明线继续，显示实习傲罗成就
                    setTimeout(() => {
                        this.showAchievement(1024);
                    }, 300);
                }
            }

            // 晋升为黑暗巫师
            promoteToDarkWizard() {
                this.score += 1024;
                this.updateScore();
                this.render();

                // 显示成就
                setTimeout(() => {
                    this.showDarkAchievement(1024);
                }, 500);
            }

            // 显示黑暗线成就
            showDarkAchievement(level) {
                if (this.achievementsShown.has('dark_' + level)) return;
                this.achievementsShown.add('dark_' + level);

                const achievement = DARK_ACHIEVEMENTS[level];
                if (achievement) {
                    this.isPaused = true;
                    this.achievementIcon.textContent = achievement.icon;
                    this.achievementTitle.textContent = achievement.title;
                    this.achievementLevel.textContent = DARK_WIZARD_LEVELS[level];
                    this.achievementDesc.textContent = achievement.desc;
                    this.achievementPopup.classList.add('show');

                    // 震动反馈
                    if (navigator.vibrate) {
                        navigator.vibrate([50, 50, 50]);
                    }
                }
            }

            canMove() {
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (this.grid[r][c] === 0) return true;
                    }
                }

                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        const current = this.grid[r][c];
                        if (r < this.size - 1 && this.grid[r + 1][c] === current) return true;
                        if (c < this.size - 1 && this.grid[r][c + 1] === current) return true;
                    }
                }

                return false;
            }
        }

        // 启动游戏
        const game = new HarryPotterGame();
    </script>
